<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Invoice Merah � Pusat Arsip Anka</title>
    <meta name="description" content="Upload dokumen arsip ke Google Drive">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    <script>
        // Strengthened Anti-Flash (FOUC) System v2.0
        (function () {
            document.documentElement.classList.add('auth-loading');
            try {
                const userData = localStorage.getItem('user_data');
                if (userData) {
                    const user = JSON.parse(userData);
                    if (user.role === 'admin_zona') {
                        document.documentElement.classList.add('role-admin-zona');
                    }
                }
            } catch (e) { }
        })();
    </script>
</head>

<body class="bg-[#0f172a] min-h-screen text-gray-200">

    <!-- Mobile Overlay -->
    <div id="mobile-overlay" class="mobile-overlay" onclick="toggleSidebar()"></div>

    <!-- Sidebar -->
    <!-- Sidebar (rendered by js/sidebar.js?v=ULTRACLEAN_2026) -->
    <aside id="sidebar"
        class="sidebar fixed top-0 left-0 h-full w-64 bg-[#0c1222] border-r border-white/5 flex flex-col z-40">
    </aside>

    <!-- Main Content -->
    <main id="main-content" class="ml-64 min-h-screen transition-all duration-300">
        <!-- Top Bar -->
        <header class="sticky top-0 z-30 backdrop-blur-xl bg-[#0f172a]/80 border-b border-white/5 px-6 py-4">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()" class="lg:hidden p-2 rounded-lg text-gray-400 hover:bg-white/5">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 6h16M4 12h16M4 18h16" />
                    </svg>
                </button>
                <div>
                    <h2 class="text-lg font-semibold text-white">Upload Invoice Merah</h2>
                    <p class="text-xs text-gray-500">Upload Invoice Merah ke sistem arsip</p>
                </div>
            </div>
        </header>

        <div class="p-6">
            <div class="max-w-3xl mx-auto space-y-6">
                <!-- Upload Form Card -->
                <div class="glass-card rounded-2xl p-6 animate-fade-in-up">
                    <form id="upload-form" class="space-y-5">
                        <!-- Drag & Drop Zone -->
                        <div>
                            <label class="block text-sm font-medium text-gray-300 mb-2">File Dokumen</label>
                            <div id="drop-zone" class="drop-zone rounded-2xl p-10 text-center cursor-pointer"
                                onclick="document.getElementById('file-input').click()">
                                <div id="drop-zone-content">
                                    <svg class="w-12 h-12 mx-auto text-indigo-400/50 mb-3" fill="none"
                                        stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                                            d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                                    </svg>
                                    <p class="text-sm text-gray-400 mb-1">Drag & drop file di sini atau <span
                                            class="text-indigo-400 font-medium">pilih file</span></p>
                                    <p class="text-xs text-gray-600">PDF, JPG, PNG � Maks 25MB</p>
                                </div>
                                <div id="file-info" class="hidden text-left w-full max-w-lg mx-auto">
                                    <div class="flex justify-between items-center mb-3">
                                        <p class="text-sm font-semibold text-white">File Terpilih:</p>
                                        <button type="button" onclick="clearFile(event)"
                                            class="text-xs text-red-400 hover:text-red-300">Clear Semua</button>
                                    </div>
                                    <ul id="file-list-display" class="space-y-2 max-h-40 overflow-y-auto pr-2">
                                        <!-- Files injected here by JS -->
                                    </ul>
                                </div>
                            </div>
                            <input id="file-input" type="file" class="hidden" accept=".pdf,.jpg,.jpeg,.png" multiple
                                onchange="handleFileSelect(this)">
                        </div>

                        <!-- (Category fixed silently as INVOICE) -->
                        <input type="hidden" id="upload-category" value="INVOICE">

                        <!-- Nominal Rupiah -->
                        <div>
                            <label class="block text-sm font-medium text-gray-300 mb-2">Total Nilai Invoice (Rp) <span
                                    class="text-gray-600">(opsional)</span></label>
                            <div class="relative">
                                <span
                                    class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 font-medium pt-0.5">Rp</span>
                                <input type="number" id="upload-nominal" placeholder="0"
                                    class="input-field w-full pl-11 pr-4 py-3 rounded-xl text-sm" step="0.01">
                            </div>
                        </div> <!-- Description -->
                        <div>
                            <label class="block text-sm font-medium text-gray-300 mb-2">Deskripsi <span
                                    class="text-gray-600">(opsional)</span></label>
                            <textarea id="upload-description" rows="3"
                                placeholder="Keterangan tambahan tentang dokumen..."
                                class="input-field w-full px-4 py-2.5 rounded-xl text-sm resize-none"></textarea>
                        </div>

                        <!-- Progress Bar -->
                        <div id="upload-progress-container" class="hidden space-y-2">
                            <div class="flex items-center justify-between">
                                <span class="text-xs text-gray-400">Mengupload...</span>
                                <span id="upload-progress-pct" class="text-xs font-medium text-indigo-400">0%</span>
                            </div>
                            <div class="progress-bar">
                                <div id="upload-progress-bar" class="progress-bar-fill" style="width: 0%"></div>
                            </div>
                        </div>

                        <!-- Submit Button -->
                        <button id="upload-btn" type="submit"
                            class="btn-primary w-full py-3 rounded-xl text-sm font-semibold flex items-center justify-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
                            </svg>
                            Upload Dokumen
                        </button>
                    </form>
                </div>

                <!-- Recent Uploads -->
                <div class="glass-card rounded-2xl p-6 animate-fade-in-up">
                    <h3 class="text-sm font-semibold text-white mb-4 flex items-center gap-2">
                        <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                        </svg>
                        Upload Terbaru
                    </h3>
                    <div id="recent-uploads" class="space-y-2">
                        <p class="text-sm text-gray-600 text-center py-6">Belum ada upload terbaru</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="js/sidebar.js?v=ULTRACLEAN_2026"></script>
    <script src="js/config.js"></script>
    <script src="js/supabase.js"></script>
    <script src="js/utils.js?v=1778387279965"></script>
    <script src="js/auth.js"></script>
    <script src="js/upload.js"></script>
    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('mobile-overlay');
            sidebar.classList.toggle('open');
            overlay.classList.toggle('active');
        }
    </script>
</body>

</html>
