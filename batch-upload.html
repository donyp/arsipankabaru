<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batch Upload � Pusat Arsip Anka</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .excel-table-container {
            max-height: calc(100vh - 450px);
            overflow-y: auto;
        }

        .row-status-pending {
            color: #9ca3af;
        }

        .row-status-ready {
            color: #f59e0b;
        }

        .row-status-uploading {
            color: #6366f1;
        }

        .row-status-success {
            color: #10b981;
        }

        .row-status-error {
            color: #ef4444;
        }
    </style>

    <script>
        // Strengthened Anti-Flash (FOUC) System v2.0
        (function () {
            document.documentElement.classList.add('auth-loading');
            try {
                const userData = localStorage.getItem('user_data');
                if (userData) {
                    const user = JSON.parse(userData);
                    if (user.role === 'admin_zona') {
                        document.documentElement.classList.add('role-admin-zona');
                    }
                }
            } catch (e) { }
        })();
    </script>
</head>

<body class="bg-[#0f172a] min-h-screen text-gray-200">
    <div id="mobile-overlay" class="mobile-overlay" onclick="toggleSidebar()"></div>

    <!-- Sidebar (rendered by js/sidebar.js?v=ULTRACLEAN_2026) -->
    <aside id="sidebar"
        class="sidebar fixed top-0 left-0 h-full w-64 bg-[#0c1222] border-r border-white/5 flex flex-col z-40">
    </aside>

    <main id="main-content" class="ml-64 min-h-screen relative">
        <header class="sticky top-0 z-30 backdrop-blur-xl bg-[#0f172a]/80 border-b border-white/5 px-6 py-4">
            <h2 class="text-xl font-bold text-white">Batch Upload</h2>
            <p class="text-xs text-gray-500">Pilih Excel POS atau langsung upload banyak file PDF</p>
        </header>

        <div class="p-6">
            <!-- Smart Dropzone -->
            <div id="excel-step"
                class="glass-card p-12 text-center border-2 border-dashed border-white/10 rounded-3xl hover:border-indigo-500/50 transition-all group">
                <input type="file" id="batch-input" accept=".pdf, .xlsx, .xls, .csv" multiple class="hidden"
                    onchange="handleSmartUpload(event)">
                <label for="batch-input" class="cursor-pointer">
                    <div
                        class="w-16 h-16 rounded-2xl bg-indigo-500/10 flex items-center justify-center mx-auto mb-4 group-hover:scale-110 transition-transform">
                        <svg class="w-8 h-8 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                                d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
                        </svg>
                    </div>
                    <h3 class="text-xl font-bold text-white mb-2">Klik atau Tarik File Ke Sini</h3>
                    <p class="text-sm text-gray-400">Dukung File Excel POS dan Multiple PDF</p>
                </label>
            </div>

            <!-- Table View -->
            <div id="mapping-step" class="hidden space-y-4 animate-fade-in">
                <div class="flex items-center justify-between">
                    <h3 class="text-lg font-bold text-white">Preview Batch</h3>
                    <div class="flex gap-2">
                        <button onclick="resetBatch()" class="btn-ghost px-4 py-2 rounded-xl text-sm">Reset</button>
                        <button onclick="uploadAllReady()" id="btn-upload-all"
                            class="btn-primary px-6 py-2 rounded-xl text-sm font-bold">Upload Semua</button>
                    </div>
                </div>

                <div class="glass-card rounded-2xl overflow-hidden">
                    <div class="excel-table-container">
                        <table class="w-full text-left border-collapse">
                            <thead class="sticky top-0 bg-[#162036] z-10">
                                <tr>
                                    <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase">Status</th>
                                    <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase">Tanggal</th>
                                    <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase">Merchant</th>
                                    <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase">Nominal</th>
                                    <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase">Berkas</th>
                                </tr>
                            </thead>
                            <tbody id="batch-table-body" class="divide-y divide-white/5"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script src="js/sidebar.js?v=ULTRACLEAN_2026"></script>

    <script src="js/config.js"></script>
    <script src="js/supabase.js"></script>
    <script src="js/utils.js?v=202605101357"></script>
    <script src="js/auth.js"></script>
    <script src="js/batch-upload-v11.js?v=1778397265704"></script>
    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('mobile-overlay');
            sidebar.classList.toggle('open');
            overlay.classList.toggle('active');
        }
    </script>
</body>

</html>
