<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manajemen Toko � Pusat Arsip Anka</title>
    <meta name="description" content="Kelola daftar toko dan klasifikasi zona">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    <script>
        // Strengthened Anti-Flash (FOUC) System v2.0
        (function () {
            document.documentElement.classList.add('auth-loading');
            try {
                const userData = localStorage.getItem('user_data');
                if (userData) {
                    const user = JSON.parse(userData);
                    if (user.role === 'admin_zona') {
                        document.documentElement.classList.add('role-admin-zona');
                    }
                }
            } catch (e) { }
        })();
    </script>
</head>

<body class="bg-[#0f172a] min-h-screen text-gray-200">

    <!-- Mobile Overlay -->
    <div id="mobile-overlay" class="mobile-overlay" onclick="toggleSidebar()"></div>

    <!-- Sidebar -->
    <!-- Sidebar (rendered by js/sidebar.js?v=ULTRACLEAN_2026) -->
    <aside id="sidebar"
        class="sidebar fixed top-0 left-0 h-full w-64 bg-[#0c1222] border-r border-white/5 flex flex-col z-40">
    </aside>

    <!-- Main Content -->
    <main id="main-content" class="ml-64 min-h-screen transition-all duration-300">
        <!-- Top Bar -->
        <header class="sticky top-0 z-30 backdrop-blur-xl bg-[#0f172a]/80 border-b border-white/5 px-6 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <button onclick="toggleSidebar()" class="lg:hidden p-2 rounded-lg text-gray-400 hover:bg-white/5">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4 6h16M4 12h16M4 18h16" />
                        </svg>
                    </button>
                    <div>
                        <h2 class="text-lg font-semibold text-white">Manajemen Toko</h2>
                        <p class="text-xs text-gray-500">Kelola daftar toko dan alokasi zona</p>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <select id="filter-zona" onchange="applyTokoFilter()"
                        class="input-field px-4 py-2 rounded-xl text-sm bg-[#0c1222]/50 border-white/10 text-gray-400 min-w-[140px]">
                        <option value="">Semua Zona</option>
                    </select>
                    <button onclick="openTokoModal()"
                        class="btn-primary px-4 py-2 rounded-xl text-sm font-medium flex items-center gap-2 shadow-lg shadow-indigo-500/20">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                        </svg>
                        Tambah Toko
                    </button>
                </div>
            </div>
        </header>

        <div class="p-6">
            <!-- Stats -->
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-6">
                <div class="glass-card rounded-2xl p-5">
                    <p class="text-xs text-gray-500 mb-1">Total Toko</p>
                    <p id="stat-total-tokos" class="text-2xl font-bold text-white">0</p>
                </div>
                <div class="glass-card rounded-2xl p-5">
                    <p class="text-xs text-gray-500 mb-1">Cakupan Zona</p>
                    <p id="stat-total-zonas" class="text-2xl font-bold text-cyan-400">0</p>
                </div>
            </div>

            <!-- List Content -->
            <div class="glass-card rounded-2xl overflow-hidden animate-fade-in text-sm">
                <div class="overflow-x-auto">
                    <table class="data-table" id="tokos-table">
                        <thead>
                            <tr>
                                <th>Nama Toko</th>
                                <th>Kode Toko</th>
                                <th>Zona</th>
                                <th class="text-right px-6">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="tokos-body">
                            <!-- Rows rendered by JS -->
                        </tbody>
                    </table>
                </div>
                <div id="tokos-empty" class="empty-state hidden">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1"
                            d="M19 21V5a2 2 0 012-2H9a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
                    </svg>
                    <p class="text-lg font-medium text-gray-400 mb-1">Daftar toko kosong</p>
                    <p class="text-sm text-gray-600">Tekan "Tambah Toko" untuk memulai.</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Add/Edit Toko Modal -->
    <div id="toko-modal" class="fixed inset-0 z-50 hidden">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="closeTokoModal()"></div>
        <div class="absolute inset-0 flex items-center justify-center p-4">
            <div
                class="relative bg-gray-900/95 border border-white/10 rounded-2xl p-6 max-w-sm w-full shadow-2xl animate-scale-in">
                <h3 id="modal-title" class="text-lg font-semibold text-white mb-5">Tambah Toko Baru</h3>
                <form id="toko-form" class="space-y-4">
                    <input type="hidden" id="edit-toko-id">
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-1.5">Nama Toko</label>
                        <input id="modal-nama" type="text" required placeholder="Contoh: Toko Berkah"
                            class="input-field w-full px-4 py-2.5 rounded-xl text-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-1.5">Kode Toko</label>
                        <input id="modal-kode" type="text" required placeholder="Contoh: TRK-01"
                            class="input-field w-full px-4 py-2.5 rounded-xl text-sm uppercase">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-1.5">Alokasi Zona</label>
                        <select id="modal-zona" required class="input-field w-full px-4 py-2.5 rounded-xl text-sm">
                            <option value="">Pilih zona</option>
                        </select>
                    </div>
                    <div class="flex gap-3 pt-2">
                        <button type="button" onclick="closeTokoModal()"
                            class="btn-ghost flex-1 py-2.5 rounded-xl text-sm font-medium">Batal</button>
                        <button type="submit"
                            class="btn-primary flex-1 py-2.5 rounded-xl text-sm font-medium">Simpan</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/sidebar.js?v=ULTRACLEAN_2026"></script>
    <script src="js/config.js"></script>
    <script src="js/supabase.js"></script>
    <script src="js/utils.js?v=1778387279965"></script>
    <script src="js/auth.js"></script>
    <script src="js/tokos.js"></script>
    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('mobile-overlay');
            sidebar.classList.toggle('open');
            overlay.classList.toggle('active');
        }
    </script>
</body>

</html>
