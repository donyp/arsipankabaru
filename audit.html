<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log Aktivitas — Pusat Arsip Anka</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">

    <script>
        // Strengthened Anti-Flash (FOUC) System v2.0
        (function () {
            document.documentElement.classList.add('auth-loading');
            try {
                const userData = localStorage.getItem('user_data');
                if (userData) {
                    const user = JSON.parse(userData);
                    if (user.role === 'admin_zona') {
                        document.documentElement.classList.add('role-admin-zona');
                    }
                }
            } catch (e) { }
        })();
    </script>
</head>

<body class="bg-[#0f172a] min-h-screen text-gray-200">

    <!-- Mobile Overlay -->
    <div id="mobile-overlay" class="mobile-overlay" onclick="toggleSidebar()"></div>

    <!-- Sidebar -->
    <!-- Sidebar (rendered by js/sidebar.js?v=ULTRACLEAN_2026) -->
    <aside id="sidebar"
        class="sidebar fixed top-0 left-0 h-full w-64 bg-[#0c1222] border-r border-white/5 flex flex-col z-40">
    </aside>

    <!-- Main Content -->
    <main id="main-content" class="ml-64 min-h-screen transition-all duration-300">
        <header
            class="sticky top-0 z-30 backdrop-blur-xl bg-[#0f172a]/80 border-b border-white/5 px-6 py-4 flex flex-col sm:flex-row sm:items-center justify-between gap-4">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()" class="lg:hidden p-2 rounded-lg text-gray-400 hover:bg-white/5">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 6h16M4 12h16M4 18h16" />
                    </svg>
                </button>
                <div>
                    <h2 class="text-lg font-semibold text-white">Log Aktivitas Sistem</h2>
                    <p class="text-xs text-gray-500">CCTV riwayat pergerakan Admin Zona dan akses data</p>
                </div>
            </div>
        </header>

        <div class="p-4 sm:p-6 pb-24">
            <div class="glass-card rounded-2xl overflow-hidden border border-white/5 flex flex-col min-h-[60vh]">
                <div class="overflow-x-auto min-h-[400px]">
                    <table class="w-full text-left border-collapse min-w-[800px]">
                        <thead>
                            <tr
                                class="border-b border-white/10 bg-white/5 text-[10px] uppercase tracking-widest text-gray-400">
                                <th class="p-4 font-semibold w-1/4">User</th>
                                <th class="p-4 font-semibold w-1/6">Aksi</th>
                                <th class="p-4 font-semibold w-1/3">Konteks</th>
                                <th class="p-4 font-semibold w-1/4">Waktu</th>
                            </tr>
                        </thead>
                        <tbody id="table-body" class="text-sm">
                            <!-- Injected via JS -->
                        </tbody>
                    </table>
                </div>

                <!-- Footer Pagination -->
                <div id="pagination"
                    class="hidden mt-auto border-t border-white/5 p-4 flex items-center justify-between bg-black/20">
                    <p class="text-xs text-gray-500" id="page-info">Menampilkan halaman 1 dari 1</p>
                    <div class="flex gap-2">
                        <button id="btn-prev" onclick="changePage(-1)"
                            class="p-2 rounded-lg bg-white/5 text-gray-400 hover:text-white hover:bg-white/10 disabled:opacity-50">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M15 19l-7-7 7-7" />
                            </svg>
                        </button>
                        <button id="btn-next" onclick="changePage(1)"
                            class="p-2 rounded-lg bg-white/5 text-gray-400 hover:text-white hover:bg-white/10 disabled:opacity-50">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M9 5l7 7-7 7" />
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Empty State -->
                <div id="empty-state" class="hidden flex-1 flex flex-col items-center justify-center py-20">
                    <div class="w-20 h-20 bg-white/5 rounded-full flex items-center justify-center mb-6">
                        <svg class="w-10 h-10 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                                d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                        </svg>
                    </div>
                    <h3 class="text-white font-medium">Tidak ada log aktivitas</h3>
                </div>

                <!-- Loading State -->
                <div id="loading-state" class="flex-1 flex items-center justify-center py-20 hidden">
                    <div class="w-8 h-8 border-2 border-indigo-500 border-t-transparent rounded-full animate-spin">
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script src="js/sidebar.js?v=ULTRACLEAN_2026"></script>

    <script src="js/config.js"></script>
    <script src="js/supabase.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/audit.js"></script>
</body>

</html>
