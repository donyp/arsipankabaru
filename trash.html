<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tong Sampah � Pusat Arsip Anka</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    <script>
        // Strengthened Anti-Flash (FOUC) System v2.0
        (function () {
            document.documentElement.classList.add('auth-loading');
            try {
                const userData = localStorage.getItem('user_data');
                if (userData) {
                    const user = JSON.parse(userData);
                    if (user.role === 'admin_zona') {
                        document.documentElement.classList.add('role-admin-zona');
                    }
                }
            } catch (e) { }
        })();
    </script>
</head>

<body class="bg-[#0f172a] min-h-screen text-gray-200">
    <div id="mobile-overlay" class="mobile-overlay" onclick="toggleSidebar()"></div>

    <!-- Sidebar (rendered by js/sidebar.js?v=ULTRACLEAN_2026) -->
    <aside id="sidebar"
        class="sidebar fixed top-0 left-0 h-full w-64 bg-[#0c1222] border-r border-white/5 flex flex-col z-40">
    </aside>

    <main class="ml-64 min-h-screen transition-all duration-300">
        <header
            class="sticky top-0 z-30 backdrop-blur-xl bg-[#0f172a]/80 border-b border-white/5 px-6 py-4 flex items-center justify-between">
            <div>
                <h2 class="text-lg font-semibold text-white">Tong Sampah (Trash)</h2>
                <p class="text-xs text-red-500 font-medium">Hati-hati: Penghapusan di sini bersifat permanen!</p>
            </div>
            <div class="flex items-center gap-3">
                <button id="bulk-delete-btn" onclick="deleteSelectedFiles()"
                    class="hidden px-4 py-2 rounded-xl text-xs bg-red-500 text-white hover:bg-red-600 transition-all shadow-lg shadow-red-500/20 whitespace-nowrap">
                    Hapus Terpilih (<span id="selected-count-old">0</span>)
                </button>
                <button onclick="emptyTrash()" data-permission="hard_delete"
                    class="btn-ghost px-4 py-2 rounded-xl text-xs text-red-400 hover:bg-red-500/10 border border-red-500/20 whitespace-nowrap">
                    Kosongkan Sampah
                </button>
            </div>
        </header>
        <!-- Toolbar Section -->
        <div class="px-6 pt-6">
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                <div class="relative group w-full max-w-md">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <svg class="w-4 h-4 text-gray-500 group-focus-within:text-red-400 transition-colors" fill="none"
                            stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                        </svg>
                    </div>
                    <input type="text" id="trash-search" oninput="searchTrash(this.value)"
                        placeholder="Cari nama file, kategori, atau penyunting..."
                        class="block w-full pl-10 pr-4 py-2.5 bg-white/5 border border-white/10 rounded-xl text-sm text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-red-500/20 focus:border-red-500/50 transition-all shadow-inner">
                </div>
                <div class="text-xs text-gray-500 italic px-2">
                    Menampilkan <span id="trash-count">0</span> file terhapus
                </div>
            </div>
        </div>

        <div class="p-6">
            <div class="glass-card rounded-2xl overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="data-table" id="trash-table">
                        <thead>
                            <tr>
                                <th class="w-10">
                                    <input type="checkbox" id="select-all" onclick="toggleSelectAll(this)"
                                        class="w-4 h-4 rounded border-white/10 bg-white/5 text-red-500 focus:ring-red-500">
                                </th>
                                <th>Nama File</th>
                                <th>Kategori</th>
                                <th>Dihapus Oleh</th>
                                <th>Tanggal Hapus</th>
                                <th class="text-right">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="trash-body">
                            <!-- Injected by JS -->
                        </tbody>
                    </table>
                </div>
                <div id="empty-state" class="empty-state hidden py-20 text-center">
                    <svg class="w-12 h-12 text-gray-700 mx-auto mb-4" fill="none" stroke="currentColor"
                        viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1"
                            d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                    </svg>
                    <p class="text-gray-500">Tong sampah kosong.</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Bulk Action Bar -->
    <div id="bulk-action-bar" class="bulk-floating-bar fixed bottom-6 left-1/2 -translate-x-1/2 z-50">
        <div
            class="bulk-inner bg-[#1e293b]/90 backdrop-blur-xl border border-white/10 rounded-2xl shadow-2xl p-2 flex items-center gap-4 animate-slide-up">
            <div class="flex items-center gap-2 px-4 border-r border-white/10">
                <div class="w-8 h-8 rounded-full bg-red-500 text-white flex items-center justify-center text-xs font-bold"
                    id="selected-count">0</div>
                <span class="text-sm font-medium text-gray-300">File</span>
            </div>
            <div class="flex items-center gap-2 p-1">
                <button id="btn-bulk-restore" onclick="bulkRestoreSelected()"
                    class="px-5 py-2.5 bg-emerald-500 hover:bg-emerald-600 text-white rounded-xl text-sm font-medium flex items-center gap-2 transition-all shadow-lg shadow-emerald-500/20">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                    </svg>
                    Pulihkan
                </button>
                <button id="btn-bulk-hard-delete" onclick="bulkDeleteSelected()"
                    class="px-5 py-2.5 bg-red-500/10 hover:bg-red-500 text-red-400 hover:text-white rounded-xl text-sm font-medium flex items-center gap-2 transition-all group">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                    </svg>
                    Hapus Permanen
                </button>
                <button onclick="clearSelection()"
                    class="px-4 py-2.5 text-gray-400 hover:text-white text-sm font-medium transition-colors">
                    Batal
                </button>
            </div>
        </div>
    </div>
    <script src="js/sidebar.js?v=ULTRACLEAN_2026"></script>

    <script src="js/config.js"></script>
    <script src="js/supabase.js"></script>
    <script src="js/utils.js?v=1778387279965"></script>
    <script src="js/auth.js"></script>
    <script src="js/trash.js"></script>
    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('mobile-overlay');
            sidebar.classList.toggle('open');
            overlay.classList.toggle('active');
        }
    </script>
</body>

</html>
