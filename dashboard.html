<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Pusat Arsip Anka</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    <script>
        document.documentElement.style.opacity = '0';
        document.documentElement.style.transition = 'opacity 0.4s ease-in-out';
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                document.documentElement.style.opacity = '1';
            }, 50);
        });
    </script>
</head>

<body class="bg-[#F0F2F5] min-h-screen text-gray-800">

    <!-- Mobile Overlay -->
    <div id="mobile-overlay" class="mobile-overlay" onclick="toggleSidebar()"></div>

    <!-- Sidebar (rendered by js/sidebar.js?v=ULTRACLEAN_2026) -->
    <aside id="sidebar"
        class="sidebar fixed top-0 left-0 h-full w-64 bg-white border-r border-gray-200 flex flex-col z-40">
    </aside>

    <!-- Main Content -->
    <main id="main-content" class="ml-64 min-h-screen transition-all duration-300">
        <!-- Top Bar -->
        <header class="sticky top-0 z-30 bg-white border-b border-gray-100 px-6 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <button onclick="toggleSidebar()" class="lg:hidden p-2 rounded-lg text-gray-400 hover:bg-gray-100">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4 6h16M4 12h16M4 18h16" />
                        </svg>
                    </button>
                    <h2 class="text-lg font-bold text-gray-700">Pusat Arsip Digital</h2>
                </div>
                <div class="flex items-center gap-4">
                    <div class="relative hidden md:block">
                        <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" fill="none"
                            stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                        </svg>
                        <input id="search-input" type="text" placeholder="Cari data arsip..."
                            class="pl-10 pr-4 py-1.5 bg-gray-50 border border-gray-200 rounded-lg text-sm w-64 focus:outline-none focus:ring-2 focus:ring-blue-100 transition-all">
                    </div>
                </div>
            </div>
        </header>

        <div class="p-6">
            <div class="max-w-7xl mx-auto space-y-6">
                <!-- Simple Header -->
                <div class="flex items-center justify-between">
                    <div>
                        <h1 class="text-xl font-bold text-gray-900">Dashboard Statistik</h1>
                        <p class="text-xs text-gray-400 font-medium">Ringkasan aktivitas dokumen hari ini.</p>
                    </div>
                    <button onclick="openBroadcastManage()" data-role="super_admin"
                        class="px-4 py-2 bg-white border border-gray-200 rounded-lg text-xs font-bold text-gray-600 hover:bg-gray-50 transition-all">
                        Kelola Siaran
                    </button>
                </div>

                <!-- Stats Grid - Simpler -->
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                    <div class="bg-white p-5 rounded-2xl border border-gray-100 shadow-sm">
                        <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Total Arsip</p>
                        <h3 id="stat-total" class="text-2xl font-bold text-gray-900 mt-1">0</h3>
                    </div>
                    <div class="bg-white p-5 rounded-2xl border border-gray-100 shadow-sm">
                        <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Sudah Dibaca</p>
                        <h3 id="stat-read" class="text-2xl font-bold text-emerald-600 mt-1">0</h3>
                    </div>
                    <div class="bg-white p-5 rounded-2xl border border-gray-100 shadow-sm">
                        <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Belum Dibaca</p>
                        <h3 id="stat-unread" class="text-2xl font-bold text-blue-600 mt-1">0</h3>
                    </div>
                    <div class="bg-white p-5 rounded-2xl border border-gray-100 shadow-sm">
                        <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Siaran Aktif</p>
                        <h3 id="stat-broadcasts" class="text-2xl font-bold text-amber-600 mt-1">0</h3>
                    </div>
                </div>

                <!-- Filters -->
                <div
                    class="bg-white p-4 rounded-2xl border border-gray-100 shadow-sm flex flex-wrap items-center gap-3">
                    <select id="filter-category" onchange="loadArchives()" data-role="super_admin"
                        class="bg-gray-50 border border-gray-200 text-xs font-bold rounded-lg px-3 py-1.5 outline-none">
                        <option value="">Semua Kat</option>
                        <option value="INVOICE">Invoice Merah</option>
                        <option value="PIUTANG">Bukti Pembayaran</option>
                    </select>
                    <select id="filter-tipe" onchange="loadArchives()"
                        class="bg-gray-50 border border-gray-200 text-xs font-bold rounded-lg px-3 py-1.5 outline-none">
                        <option value="">Semua Tipe</option>
                        <option value="PPN">PPN</option>
                        <option value="NON">NON PPN</option>
                    </select>
                    <select id="filter-zona" onchange="loadArchives()"
                        class="bg-gray-50 border border-gray-200 text-xs font-bold rounded-lg px-3 py-1.5 outline-none">
                        <option value="">Semua Zona</option>
                    </select>
                    <select id="filter-toko" onchange="loadArchives()"
                        class="bg-gray-50 border border-gray-200 text-xs font-medium rounded-lg px-3 py-1.5 outline-none">
                        <option value="">Semua Toko</option>
                    </select>
                    <div class="flex items-center gap-2 ml-auto">
                        <input id="filter-date-start" type="date"
                            class="bg-gray-50 border border-gray-200 text-xs rounded-lg px-2 py-1">
                        <span class="text-gray-300">-</span>
                        <input id="filter-date-end" type="date"
                            class="bg-gray-50 border border-gray-200 text-xs rounded-lg px-2 py-1">
                        <button onclick="resetFilters()" class="p-1.5 text-gray-400 hover:text-gray-600"><svg
                                class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                            </svg></button>
                    </div>
                </div>

                <!-- Optimized Archive Table (The part you requested) -->
                <div class="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
                    <div class="overflow-x-auto scrollbar-thin">
                        <table class="w-full text-left border-collapse" id="archive-table">
                            <thead>
                                <tr
                                    class="bg-gray-50 text-[10px] font-bold text-gray-400 uppercase tracking-widest border-b border-gray-100">
                                    <th class="pl-6 py-4 w-10"><input type="checkbox" id="select-all"
                                            onclick="toggleSelectAll(this)" class="accent-blue-600"></th>
                                    <th class="py-4 pr-4">Nama Berkas</th>
                                    <th class="py-4 px-2 w-20">Kategori</th>
                                    <th class="py-4 px-2 w-16">Tipe</th>
                                    <th class="py-4 px-2 w-24">Zona</th>
                                    <th class="py-4 px-2 w-32">Toko</th>
                                    <th class="py-4 px-2 w-28">Tgl Dokumen</th>
                                    <th class="py-4 px-3 w-28">Tgl Upload</th>
                                    <th class="py-4 pr-6 pl-4 text-right w-20">Aksi</th>
                                </tr>
                            </thead>
                            <tbody id="archive-body" class="divide-y divide-gray-50"></tbody>
                        </table>
                    </div>
                    <div id="loading-state" class="hidden py-20 text-center">
                        <div
                            class="inline-block w-8 h-8 border-4 border-blue-100 border-t-blue-600 rounded-full animate-spin">
                        </div>
                    </div>
                </div>

                <!-- Pagination -->
                <div id="pagination" class="flex items-center justify-between py-4">
                    <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">
                        Menampilkan <span id="showing-range">0-0</span> dari <span id="total-count">0</span> Data
                    </p>
                    <div class="flex gap-2">
                        <button id="prev-btn" onclick="prevPage()" disabled
                            class="px-3 py-1.5 bg-white border border-gray-200 rounded-lg text-[10px] font-bold uppercase tracking-widest disabled:opacity-30">Prev</button>
                        <button id="next-btn" onclick="nextPage()" disabled
                            class="px-3 py-1.5 bg-white border border-gray-200 rounded-lg text-[10px] font-bold uppercase tracking-widest disabled:opacity-30">Next</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Bulk Action Bar -->
    <div id="bulk-action-bar"
        class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-6 py-3 rounded-2xl shadow-2xl z-50 flex items-center gap-6 transition-all duration-300 opacity-0 invisible translate-y-10">
        <div class="flex items-center gap-2 border-r border-white/10 pr-6">
            <span id="selected-count"
                class="w-6 h-6 bg-blue-600 rounded-full flex items-center justify-center text-[10px] font-black">0</span>
            <span class="text-xs font-bold uppercase tracking-widest">Item Terpilih</span>
        </div>
        <div class="flex items-center gap-3">
            <button onclick="downloadSelected()"
                class="bg-white text-gray-900 px-4 py-1.5 rounded-lg text-[10px] font-black uppercase tracking-widest hover:bg-gray-100">Download</button>
            <button onclick="bulkDeleteSelected()"
                class="bg-red-600 text-white px-4 py-1.5 rounded-lg text-[10px] font-black uppercase tracking-widest hover:bg-red-700">Hapus</button>
            <button onclick="clearSelection()" class="text-xs font-medium text-gray-400 hover:text-white">Batal</button>
        </div>
    </div>

    <!-- Modals (Preview & Dispute) omitted for brevity in response but kept in file -->
    <!-- PDF Preview Modal -->
    <div id="preview-modal" class="fixed inset-0 z-50 hidden">
        <div class="absolute inset-0 bg-black/70 backdrop-blur-sm" onclick="closePreview()"></div>
        <div class="absolute inset-4 md:inset-10 flex flex-col bg-white rounded-2xl overflow-hidden">
            <div class="p-4 border-b border-gray-100 flex items-center justify-between">
                <h3 id="preview-title" class="text-sm font-bold text-gray-900 truncate">Preview Dokumen</h3>
                <div class="flex gap-2">
                    <a id="preview-download" href="#" target="_blank" class="p-2 text-gray-400 hover:text-blue-600"><svg
                            class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" stroke-width="2" />
                        </svg></a>
                    <button onclick="closePreview()" class="p-2 text-gray-400 hover:text-red-500"><svg class="w-5 h-5"
                            fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path d="M6 18L18 6M6 6l12 12" stroke-width="2" />
                        </svg></button>
                </div>
            </div>
            <div class="flex-1 bg-gray-100"><iframe id="preview-iframe" class="w-full h-full border-none"></iframe>
            </div>
        </div>
    </div>

    <script src="js/sidebar.js?v=ULTRACLEAN_2026"></script>
    <script src="js/config.js"></script>
    <script src="js/supabase.js"></script>
    <script src="js/utils.js?v=1778387279965"></script>
    <script src="js/auth.js"></script>
    <script src="js/dashboard.js"></script>
</body>

</html>
