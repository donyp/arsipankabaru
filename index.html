<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Pusat Arsip Anka</title>
    <meta name="description" content="Pusat Arsip Anka — Login untuk mengakses arsip kantor">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-animated min-h-screen flex items-center justify-center p-4 overflow-hidden">

    <!-- Floating Particles Background -->
    <div id="particles" class="fixed inset-0 pointer-events-none z-0"></div>

    <!-- Decorative Blurs -->
    <div
        class="fixed top-[-20%] left-[-10%] w-[500px] h-[500px] bg-indigo-600/20 rounded-full blur-[120px] pointer-events-none">
    </div>
    <div
        class="fixed bottom-[-20%] right-[-10%] w-[500px] h-[500px] bg-cyan-600/15 rounded-full blur-[120px] pointer-events-none">
    </div>

    <!-- Login Card -->
    <div class="relative z-10 w-full max-w-md animate-fade-in-up">
        <!-- Logo & Title -->
        <div class="text-center mb-8">
            <div
                class="inline-flex items-center justify-center w-20 h-20 rounded-2xl bg-gradient-to-br from-indigo-500 to-cyan-500 shadow-lg shadow-indigo-500/30 mb-5 animate-float">
                <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                        d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4" />
                </svg>
            </div>
            <h1 class="text-3xl font-bold text-white mb-2">Pusat Arsip Anka</h1>
            <!-- Subtitle removed per request -->
        </div>

        <!-- Card -->
        <div class="glass-card rounded-3xl p-8 glow-primary">
            <div class="space-y-6">
                <div class="text-center">
                    <h2 class="text-xl font-semibold text-white mb-1">Selamat Datang</h2>
                    <p class="text-gray-400 text-sm">Masuk dengan akun Anda untuk melanjutkan</p>
                </div>

                <!-- Login Form -->
                <form id="login-form" class="space-y-4">
                    <div>
                        <label for="login-email" class="block text-sm font-medium text-gray-300 mb-1.5">Username</label>
                        <div class="relative">
                            <svg class="absolute left-3.5 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-500" fill="none"
                                stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207" />
                            </svg>
                            <input id="login-email" type="text" required placeholder="Masukkan username Anda"
                                class="input-field w-full pl-11 pr-4 py-3 rounded-xl text-sm" autocomplete="username">
                        </div>
                    </div>
                    <div>
                        <label for="login-password"
                            class="block text-sm font-medium text-gray-300 mb-1.5">Password</label>
                        <div class="relative">
                            <svg class="absolute left-3.5 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-500" fill="none"
                                stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                            </svg>
                            <input id="login-password" type="password" required placeholder="Masukkan password"
                                class="input-field w-full pl-11 pr-12 py-3 rounded-xl text-sm"
                                autocomplete="current-password">
                            <button type="button" onclick="togglePassword()"
                                class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-300 transition-colors">
                                <svg id="eye-icon" class="w-5 h-5" fill="none" stroke="currentColor"
                                    viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                                </svg>
                            </button>
                        </div>
                    </div>

                    <!-- Error Message -->
                    <div id="login-error"
                        class="hidden text-sm text-red-400 bg-red-500/10 border border-red-500/20 rounded-xl px-4 py-2.5 flex items-center gap-2">
                        <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L3.732 16.5c-.77.833.192 2.5 1.732 2.5z" />
                        </svg>
                        <span id="login-error-text"></span>
                    </div>

                    <!-- Login Button -->
                    <button type="submit" id="btn-login"
                        class="w-full relative overflow-hidden bg-white text-gray-900 shadow-md font-semibold rounded-2xl py-3 px-4 hover:shadow-xl hover:-translate-y-1 hover:bg-gray-50 focus:outline-none focus:ring-4 focus:ring-white/20 transition-all duration-300">
                        <span class="relative z-10">Masuk</span>
                    </button>
                </form>

                <!-- Footer removed per request -->
            </div>
        </div>

        <!-- Footer -->
        <p class="text-center text-xs text-gray-600 mt-6">
            &copy; 2026 Pusat Arsip Anka &bull; v2.1
        </p>
    </div>

    <!-- Scripts (No Supabase CDN, No Google Identity Services) -->
    <script src="js/config.js"></script>
    <script src="js/supabase.js"></script>
    <script src="js/utils.js?v=1778387279965"></script>
    <script src="js/auth.js"></script>
    <script>
        // Check if already logged in via JWT
        (function () {
            const token = API.getToken();
            const urlParams = new URLSearchParams(window.location.search);
            const reason = urlParams.get('reason');

            if (reason === 'maintenance') {
                const errorDiv = document.getElementById('login-error');
                const errorText = document.getElementById('login-error-text');
                if (errorDiv && errorText) {
                    errorDiv.classList.remove('hidden');
                    errorText.innerHTML = '<strong>Sistem Sedang Perbaikan:</strong> Akses ditangguhkan sementara. Silakan coba lagi nanti.';
                    // Clear param from URL without refresh
                    window.history.replaceState({}, document.title, window.location.pathname);
                }
            } else if (token) {
                window.location.href = 'dashboard.html';
            }
        })();

        // Toggle password visibility
        function togglePassword() {
            const input = document.getElementById('login-password');
            const icon = document.getElementById('eye-icon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>';
            } else {
                input.type = 'password';
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>';
            }
        }

        // Login form handler
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-login');
            const errorDiv = document.getElementById('login-error');
            const errorText = document.getElementById('login-error-text');

            const email = document.getElementById('login-email').value.trim().toLowerCase();
            const password = document.getElementById('login-password').value;

            btn.disabled = true;
            btn.innerHTML = '<div class="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div><span class="ml-2">Memproses...</span>';
            errorDiv.classList.add('hidden');

            try {
                await loginWithCredentials(email, password);
            } catch (err) {
                btn.disabled = false;
                btn.innerHTML = '<span class="relative z-10">Masuk</span>';
                errorDiv.classList.remove('hidden');
                errorText.textContent = err.message;
            }
        });

        // Generate floating particles
        (function () {
            const container = document.getElementById('particles');
            const colors = ['#6366f1', '#06b6d4', '#818cf8', '#22d3ee'];
            for (let i = 0; i < 30; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const size = Math.random() * 6 + 2;
                const color = colors[Math.floor(Math.random() * colors.length)];
                p.style.cssText = `
                    width: ${size}px; height: ${size}px;
                    background: ${color};
                    left: ${Math.random() * 100}%;
                    top: ${Math.random() * 100}%;
                    animation: float ${Math.random() * 8 + 6}s ease-in-out infinite;
                    animation-delay: ${Math.random() * 5}s;
                `;
                container.appendChild(p);
            }
        })();
    </script>
</body>

</html>
